# Dependabot configuration — auto-file PRs for dependency updates.
# Security alerts file PRs against master; version updates are limited
# so we don't drown in dependency-bump noise.

version: 2
updates:
  # Python dependencies declared in pyproject.toml
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      # Bundle minor/patch updates so we don't get 10 separate PRs
      # for routine bumps. Security-scoped PRs remain ungrouped.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used in .github/workflows/
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
      include: "scope"
